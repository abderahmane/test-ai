<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Office Inventory Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1>📦 Office Inventory Manager</h1>
      <p class="subtitle">Track, manage and organize your office assets</p>
    </div>
  </header>

  <main class="container">
    <!-- Summary cards -->
    <section class="stats" id="stats">
      <div class="stat-card">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">Total Items</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statQuantity">0</span>
        <span class="stat-label">Total Quantity</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statLow">0</span>
        <span class="stat-label">Low Stock</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statCategories">0</span>
        <span class="stat-label">Categories</span>
      </div>
    </section>

    <!-- Add / Edit form -->
    <section class="card">
      <h2 id="formTitle">Add New Item</h2>
      <form id="itemForm" autocomplete="off">
        <input type="hidden" id="itemId" />
        <div class="form-grid">
          <div class="field">
            <label for="name">Item Name *</label>
            <input type="text" id="name" placeholder="e.g. Dell Monitor" required />
          </div>
          <div class="field">
            <label for="category">Category *</label>
            <input type="text" id="category" placeholder="e.g. Electronics" list="categoryList" required />
            <datalist id="categoryList"></datalist>
          </div>
          <div class="field">
            <label for="quantity">Quantity *</label>
            <input type="number" id="quantity" min="0" step="1" placeholder="0" required />
          </div>
          <div class="field">
            <label for="location">Location</label>
            <input type="text" id="location" placeholder="e.g. Floor 2 - Room 204" />
          </div>
          <div class="field">
            <label for="status">Status</label>
            <select id="status">
              <option value="In Stock">In Stock</option>
              <option value="Low Stock">Low Stock</option>
              <option value="Out of Stock">Out of Stock</option>
              <option value="Under Repair">Under Repair</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">Add Item</button>
          <button type="button" class="btn btn-secondary" id="cancelBtn" hidden>Cancel</button>
        </div>
      </form>
    </section>

    <!-- Toolbar -->
    <section class="toolbar">
      <input type="search" id="searchInput" placeholder="🔍 Search items..." />
      <select id="filterCategory">
        <option value="">All Categories</option>
      </select>
      <select id="filterStatus">
        <option value="">All Statuses</option>
        <option value="In Stock">In Stock</option>
        <option value="Low Stock">Low Stock</option>
        <option value="Out of Stock">Out of Stock</option>
        <option value="Under Repair">Under Repair</option>
      </select>
      <button type="button" class="btn btn-danger" id="clearAllBtn">Clear All</button>
    </section>

    <!-- Inventory table -->
    <section class="card table-card">
      <table id="inventoryTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Location</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventoryBody"></tbody>
      </table>
      <p class="empty-state" id="emptyState" hidden>No items found. Add your first inventory item above.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
