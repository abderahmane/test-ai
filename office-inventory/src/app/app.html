<header class="app-header">
  <div class="header-inner">
    <h1>📦 Office Inventory Manager</h1>
    <p class="subtitle">Track, manage and organize your office assets</p>
  </div>
</header>

<main class="container">
  <app-inventory-stats [stats]="stats()" />

  <app-item-form
    [editingItem]="editing()"
    (saved)="onSaved()"
    (cancelled)="editing.set(null)"
  />

  <section class="toolbar">
    <input
      type="search"
      placeholder="🔍 Search items..."
      [ngModel]="search()"
      (ngModelChange)="onSearch($event)"
    />
    <select
      [ngModel]="filterCategory()"
      (ngModelChange)="onFilterCategory($event)"
    >
      <option value="">All Categories</option>
      @for (c of categories(); track c) {
        <option [value]="c">{{ c }}</option>
      }
    </select>
    <select
      [ngModel]="filterStatus()"
      (ngModelChange)="onFilterStatus($event)"
    >
      <option value="">All Statuses</option>
      <option value="In Stock">In Stock</option>
      <option value="Low Stock">Low Stock</option>
      <option value="Out of Stock">Out of Stock</option>
      <option value="Under Repair">Under Repair</option>
    </select>
    <button type="button" class="btn btn-danger" (click)="onClearAll()">
      Clear All
    </button>
  </section>

  <app-inventory-list
    [items]="items()"
    [loading]="loading()"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
  />
</main>
