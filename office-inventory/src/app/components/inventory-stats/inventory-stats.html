<section class="stats">
  <div class="stat-card">
    <span class="stat-value">{{ stats?.totalItems ?? 0 }}</span>
    <span class="stat-label">Total Items</span>
  </div>
  <div class="stat-card">
    <span class="stat-value">{{ stats?.totalQuantity ?? 0 }}</span>
    <span class="stat-label">Total Quantity</span>
  </div>
  <div class="stat-card">
    <span class="stat-value">{{ stats?.lowStockCount ?? 0 }}</span>
    <span class="stat-label">Low Stock</span>
  </div>
  <div class="stat-card">
    <span class="stat-value">{{ stats?.categoryCount ?? 0 }}</span>
    <span class="stat-label">Categories</span>
  </div>
</section>
